<div class="login-wrapper">

  <div class="login-card">

    <!-- Logo / Brand -->
    <div class="brand">
      <div class="brand-icon">&#128197;</div>
      <h1>Event Registration Portal</h1>
      <p class="brand-sub">Sign in to manage your events</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

      <!-- Username -->
      <div class="field" [class.field--error]="username?.invalid && username?.touched">
        <label for="username">Username</label>
        <div class="input-wrap">
          <span class="input-icon">&#128100;</span>
          <input
            id="username"
            type="text"
            formControlName="username"
            placeholder="Enter your username"
            autocomplete="username"
          />
        </div>
        <span class="error-msg" *ngIf="username?.invalid && username?.touched">
          Username is required.
        </span>
      </div>

      <!-- Password -->
      <div class="field" [class.field--error]="password?.invalid && password?.touched">
        <label for="password">Password</label>
        <div class="input-wrap">
          <span class="input-icon">&#128274;</span>
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="Enter your password"
            autocomplete="current-password"
          />
        </div>
        <span class="error-msg" *ngIf="password?.invalid && password?.touched">
          Password is required.
        </span>
      </div>

      <!-- Invalid credentials alert -->
      <div class="alert" *ngIf="loginError">
        <span>&#9888;</span> Invalid username or password.
      </div>

      <button type="submit" [disabled]="loginForm.invalid" class="btn-login">
        Sign In
      </button>

    </form>

    <p class="hint">Use <code>user</code> / <code>user123</code></p>

  </div>

</div>
