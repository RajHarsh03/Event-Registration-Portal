<div class="login-page">

  <div class="left-section">
    <h1 class="brand-title">EVENT REGISTRATION</h1>
    <h2 class="brand-subtitle">PORTAL</h2>
    <p class="brand-desc">A centralized platform for managing event registrations and participant records.</p>
  </div>

  <div class="right-section">

    <div class="login-card">

      <h3 class="login-heading">User Login</h3>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

        <!-- Username -->
        <div class="form-field">
          <label for="username">Username</label>
          <input
            id="username"
            type="text"
            formControlName="username"
            placeholder="Enter username"
            [class.input-error]="username?.invalid && username?.touched"
          />
          <span class="error-text" *ngIf="username?.invalid && username?.touched">
            Username is required.
          </span>
        </div>

        <!-- Password -->
        <div class="form-field">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="Enter your password"
            [class.input-error]="password?.invalid && password?.touched"
          />
          <span class="error-text" *ngIf="password?.invalid && password?.touched">
            Password is required.
          </span>
        </div>

        <!-- Invalid credentials message -->
        <div class="error-banner" *ngIf="loginError">
          Invalid username or password.
        </div>

        <button type="submit" [disabled]="loginForm.invalid" class="login-btn">
          Login
        </button>

      </form>

      <div class="demo-access">
        <p class="demo-label">DEMO ACCESS</p>
        <p class="demo-cred"><strong>USER</strong> user / user123</p>
      </div>

    </div>

  </div>

</div>
