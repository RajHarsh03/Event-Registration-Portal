<div class="page">

  <header class="navbar">
    <span class="brand">Event Registration Portal</span>
  </header>

  <div class="main">
    <div class="card">

      <h3>Login</h3>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

        <div class="form-group">
          <label for="username">Username</label>
          <input
            id="username"
            type="text"
            formControlName="username"
            placeholder="Enter username"
            [class.input-error]="username?.invalid && username?.touched"
          />
          <span class="error-text" *ngIf="username?.invalid && username?.touched">
            Username is required.
          </span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="Enter password"
            [class.input-error]="password?.invalid && password?.touched"
          />
          <span class="error-text" *ngIf="password?.invalid && password?.touched">
            Password is required.
          </span>
        </div>

        <div class="error-banner" *ngIf="loginError">
          Invalid username or password.
        </div>

        <button type="submit" [disabled]="loginForm.invalid" class="btn-login">
          Login
        </button>

      </form>

      <div class="demo-access">
        <span class="demo-label">DEMO ACCESS</span>
        <span class="demo-cred"><strong>USER</strong> user / user123</span>
      </div>

    </div>
  </div>

</div>
